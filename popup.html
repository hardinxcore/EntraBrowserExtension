<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Entra Favorites</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1>Entra Favorites</h1>
      <div class="header-actions">
        <a href="https://github.com/hardinxcore/EntraBrowserExtension" target="_blank" class="icon-btn" title="View on GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
          </svg>
        </a>
        <button id="import-btn" class="icon-btn" title="Import JSON">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"></path>
          </svg>
        </button>
        <button id="export-btn" class="icon-btn" title="Export JSON">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5-5 5 5M12 5v12"></path>
          </svg>
        </button>
      </div>
    </div>
    
    <div class="tenant-switcher">
      <input type="text" id="tenant-input" placeholder="Tenant ID (optional)" spellcheck="false" title="Global Tenant ID to append to URLs (e.g. for CSP)">
    </div>

    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search favorites..." autocomplete="off">
    </div>

    <div class="sorting-toggle">
      <span>Auto-sort Menus</span>
      <label class="switch" title="Automatically sort Entra left menus alphabetically">
        <input type="checkbox" id="sort-toggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <button id="add-btn" class="btn primary-btn">+ Add Current Page</button>
  </div>
  
  <div class="tabs">
    <button class="tab-btn active" data-tab="groups">Groups</button>
    <button class="tab-btn" data-tab="users">Users</button>
    <button class="tab-btn" data-tab="intune">Intune</button>
    <button class="tab-btn" data-tab="applications">Apps</button>
  </div>

  <div class="tab-content">
    <div id="groups" class="tab-pane active">
      <ul class="favorites-list" id="list-groups"></ul>
      <div class="empty-state" id="empty-groups">No groups found.</div>
    </div>
    <div id="users" class="tab-pane">
      <ul class="favorites-list" id="list-users"></ul>
      <div class="empty-state" id="empty-users">No users found.</div>
    </div>
    <div id="intune" class="tab-pane">
      <ul class="favorites-list" id="list-intune"></ul>
      <div class="empty-state" id="empty-intune">No Intune devices/policies found.</div>
    </div>
    <div id="applications" class="tab-pane">
      <ul class="favorites-list" id="list-applications"></ul>
      <div class="empty-state" id="empty-applications">No applications found.</div>
    </div>
  </div>

  <!-- Quick Links -->
  <div class="quick-links">
    <a href="https://entra.microsoft.com/" target="_blank">Microsoft Entra</a>
    <a href="https://intune.microsoft.com/" target="_blank">Microsoft Intune</a>
    <a href="https://admin.microsoft.com/" target="_blank">M365 Admin</a>
  </div>

  <div id="toast" class="toast">Saved!</div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <p style="margin-top:0; font-weight:600;">Edit Favorite</p>
      <input type="text" id="edit-name-input" class="modal-input" placeholder="Name">
      
      <p style="margin-top:0; margin-bottom: 8px; font-size: 13px; font-weight:500;">Color Tag</p>
      <div class="color-picker" id="edit-color-picker">
        <!-- Generates injected colors -->
      </div>
      
      <div class="modal-actions" style="margin-top: 16px;">
        <button id="cancel-edit-btn" class="btn secondary-btn">Cancel</button>
        <button id="save-edit-btn" class="btn primary-btn">Save</button>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept=".json" style="display: none;">

  <script src="popup.js"></script>
</body>
</html>
